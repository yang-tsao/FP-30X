<?xml version="1.0" encoding="UTF-8"?>
<!--
  Icono generico: teclado abstracto + barras de control (metafora MIDI/app).
  Sin logotipos ni diseno de producto Roland; geometria propia.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="fp30x-icon-bg" x1="40" y1="32" x2="216" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34343c"/>
      <stop offset="1" stop-color="#121218"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#fp30x-icon-bg)"/>
  <rect x="0.5" y="0.5" width="255" height="255" rx="52" stroke="#45454f" stroke-width="1"/>
  <!-- Niveladores / control remoto (acento naranja de la app) -->
  <g fill="#E07828">
    <rect x="170" y="38" width="9" height="46" rx="2"/>
    <rect x="184" y="46" width="9" height="38" rx="2"/>
    <rect x="198" y="40" width="9" height="44" rx="2"/>
    <rect x="212" y="50" width="9" height="34" rx="2"/>
  </g>
  <!-- Teclas blancas y negras: patron de piano generico (7+5), no copia de ningun modelo -->
  <g transform="translate(18 108)">
    <rect x="0" y="0" width="30" height="122" rx="4" fill="#d4d4dc"/>
    <rect x="32" y="0" width="30" height="122" rx="4" fill="#d4d4dc"/>
    <rect x="64" y="0" width="30" height="122" rx="4" fill="#d4d4dc"/>
    <rect x="96" y="0" width="30" height="122" rx="4" fill="#d4d4dc"/>
    <rect x="128" y="0" width="30" height="122" rx="4" fill="#d4d4dc"/>
    <rect x="160" y="0" width="30" height="122" rx="4" fill="#d4d4dc"/>
    <rect x="192" y="0" width="30" height="122" rx="4" fill="#d4d4dc"/>
    <rect x="19" y="0" width="18" height="74" rx="2" fill="#1c1c24"/>
    <rect x="51" y="0" width="18" height="74" rx="2" fill="#1c1c24"/>
    <rect x="115" y="0" width="18" height="74" rx="2" fill="#1c1c24"/>
    <rect x="147" y="0" width="18" height="74" rx="2" fill="#1c1c24"/>
    <rect x="179" y="0" width="18" height="74" rx="2" fill="#1c1c24"/>
  </g>
</svg>
